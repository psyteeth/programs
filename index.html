
<style>
.wrap{padding:1rem 0}
.tabs{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.tab{padding:6px 16px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-size:13px;transition:all .2s}
.tab.active{border-color:var(--acc);color:var(--acc);background:color-mix(in srgb,var(--acc) 12%,transparent);font-weight:500}
.grid{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:20px;align-items:start}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem}
.rc{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;display:flex;flex-direction:column;align-items:center}
.lbl{font-size:11px;color:var(--color-text-tertiary);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.kf{font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:20px;border:0.5px solid var(--acc);color:var(--acc);background:color-mix(in srgb,var(--acc) 8%,transparent);display:inline-block;margin-bottom:12px}
.sty{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:10px}
.dsc{font-size:13px;color:var(--color-text-secondary);line-height:1.65;margin-bottom:16px}
.sec{font-size:11px;color:var(--color-text-tertiary);letter-spacing:.08em;text-transform:uppercase;margin:14px 0 6px}
.bars{display:flex;flex-direction:column;gap:8px}
.br{display:flex;align-items:center;gap:8px}
.bn{font-size:12px;color:var(--color-text-secondary);width:96px;flex-shrink:0}
.bt{flex:1;height:3px;background:var(--color-background-secondary);border-radius:2px}
.bf{height:3px;border-radius:2px}
.bv{font-size:12px;color:var(--color-text-primary);width:22px;text-align:right}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;margin-bottom:12px}
.rl{font-size:11px;color:var(--color-text-tertiary);letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;align-self:flex-start}
.rh{font-size:12px;color:var(--color-text-tertiary);margin-top:12px}
</style>

<div class="wrap">
  <div class="tabs" id="tabs"></div>
  <div class="grid">
    <div class="card" id="pcard"></div>
    <div class="rc">
      <div class="rl">Профиль триады</div>
      <div style="position:relative;width:240px;height:240px"><canvas id="rc"></canvas></div>
      <div class="rh" id="rh"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const P = [
  { h:"@Tatyana_Dynnikova", full:"Таня Дынникова", acc:"#534AB7", bg:"#EEEDFE", fg:"#3C3489", ini:"ТД",
    sty:"Добрая опора", kf:"ясли", emo:"⚖️",
    dsc:"Высокое долженствование с низкой тёмной триадой. Не давит, не манипулирует — просто искренне уверена, что так надо. Первая точка входа: к ней приходят, когда ещё страшно и не готово к жёсткой работе.",
    s:{"Манипуляции":1.4,"Нарциссизм":2.7,"Психопатия":1.7,"Вера в людей":3.5,"Гуманизм":4.0,"Долженствование":4.0} },
  { h:"@kazakovaw", full:"Гульназ Казакова", acc:"#1D9E75", bg:"#E1F5EE", fg:"#085041", ini:"ГК",
    sty:"Архитектор Влияния", kf:"холодный расчёт", emo:"🕸️",
    dsc:"Макиавеллизм 3.7 без лишней сентиментальности. Видит игру там, где другие видят разговор. Чувствует рычаги влияния интуитивно — даже не замечая этого. Опасна не агрессией, а паузой.",
    s:{"Манипуляции":3.7,"Нарциссизм":2.4,"Психопатия":2.4,"Вера в людей":2.5,"Гуманизм":2.8,"Долженствование":3.0} },
  { h:"@YanaPanchenk0", full:"Яна Панченко", acc:"#993556", bg:"#FBEAF0", fg:"#72243E", ini:"ЯП",
    sty:"Нарцисс с Душой", kf:"позволь себе", emo:"🌹",
    dsc:"Нарциссизм + высокий гуманизм + свобода от долга. Яркая, самодостаточная — и при этом искренне любит людей. Хочет блистать и всем помочь одновременно. Это не противоречие — это суперсила.",
    s:{"Манипуляции":2.3,"Нарциссизм":3.0,"Психопатия":3.1,"Вера в людей":3.0,"Гуманизм":4.5,"Долженствование":2.5} },
  { h:"@happinessguy", full:"Антон Казаков", acc:"#BA7517", bg:"#FAEEDA", fg:"#633806", ini:"АК",
    sty:"Главный психопат", kf:"бесславные психопаты", emo:"⚡",
    dsc:"Главный психопат группы — с высокой верой в людей и гуманизмом. Не избегает страха — просто не заражается им. Стыд не останавливает, вина не парализует. Идеальный провокатор: видит маску, не ловит тревогу за ней.",
    s:{"Манипуляции":2.7,"Нарциссизм":2.7,"Психопатия":3.8,"Вера в людей":4.0,"Гуманизм":4.3,"Долженствование":3.5} }
];
const L = Object.keys(P[0].s);
let cur=3, ch=null;

function card(p){
  document.getElementById('pcard').innerHTML=`
    <div class="av" style="background:${p.bg};color:${p.fg}">${p.ini}</div>
    <div class="lbl">${p.h}</div>
    <div class="kf">зубное кунг-фу: ${p.kf}</div>
    <div style="font-size:16px;margin-bottom:8px">${p.emo} <span class="sty" style="display:inline">${p.sty}</span></div>
    <div class="dsc">${p.dsc}</div>
    <div class="sec">Показатели</div>
    <div class="bars">${L.map(l=>`<div class="br">
      <span class="bn">${l}</span>
      <div class="bt"><div class="bf" style="width:${(p.s[l]/5)*100}%;background:${p.acc}"></div></div>
      <span class="bv">${p.s[l]}</span>
    </div>`).join('')}</div>`;
}

function radar(p){
  const ctx=document.getElementById('rc').getContext('2d');
  if(ch) ch.destroy();
  ch=new Chart(ctx,{
    type:'radar',
    data:{labels:L,datasets:[{data:L.map(l=>p.s[l]),backgroundColor:p.acc+'20',borderColor:p.acc,borderWidth:2,pointBackgroundColor:p.acc,pointRadius:3}]},
    options:{responsive:false,plugins:{legend:{display:false}},
      scales:{r:{min:0,max:5,ticks:{display:false},grid:{color:'rgba(128,128,128,0.12)'},angleLines:{color:'rgba(128,128,128,0.12)'},pointLabels:{font:{size:10},color:'#888780'}}}}
  });
  document.getElementById('rh').textContent=p.h;
}

function sel(i){
  cur=i;
  document.documentElement.style.setProperty('--acc',P[i].acc);
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  card(P[i]); radar(P[i]);
}

const tb=document.getElementById('tabs');
P.forEach((p,i)=>{
  const b=document.createElement('button');
  b.className='tab'+(i===cur?' active':'');
  b.innerHTML=`<span style="font-size:14px">${p.emo}</span> ${p.full.split(' ')[0]}`;
  b.onclick=()=>sel(i);
  tb.appendChild(b);
});
sel(cur);
</script>
